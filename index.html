<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mes Colis">
<title>Mes Colis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2a2a2a;
    --text: #f0ede8;
    --muted: #666;
    --accent: #e8d5a3;
    --accent-dim: #3a3220;
    --success: #4caf7d;
    --success-dim: #1a3328;
    --danger: #e05c5c;
    --danger-dim: #3a1a1a;
    --warning: #e0a040;
    --warning-dim: #3a2a10;
    --info: #5b9cf6;
    --info-dim: #1a2a40;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .app { max-width: 480px; margin: 0 auto; padding: 24px 16px 40px; }

  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-top: 8px;
  }

  .logo {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .logo span { color: var(--accent); }

  .header-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  .settings-btn {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    padding: 8px 10px;
    cursor: pointer;
    font-size: 18px;
    transition: color 0.15s;
  }

  .settings-btn:hover { color: var(--text); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 8px;
    text-align: center;
  }

  .stat-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 22px; font-weight: 700; margin-top: 4px; }

  .actions { display: flex; gap: 8px; margin-bottom: 20px; }

  .btn {
    flex: 1;
    padding: 11px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: background 0.15s, border-color 0.15s;
  }

  .btn:hover { background: var(--surface2); }
  .btn:disabled { opacity: 0.4; cursor: default; }

  .btn-accent {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-accent:hover { background: #4a3f28; }

  .filters { display: flex; gap: 6px; margin-bottom: 16px; }

  .filter {
    padding: 6px 14px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter.active {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
  }

  .delivery-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    transition: border-color 0.15s;
  }

  .delivery-card:hover { border-color: #444; }

  .delivery-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }

  .delivery-name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
  }

  .delivery-tracking {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  .delivery-bottom { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
  }

  .badge-carrier {
    background: var(--surface2);
    color: var(--muted);
    border: 0.5px solid var(--border);
  }

  .badge-date { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .log-box {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    display: none;
  }

  .log-line { padding: 3px 0; border-bottom: 0.5px solid var(--border); }
  .log-line:last-child { border-bottom: none; }
  .log-ok { color: var(--success); }
  .log-err { color: var(--danger); }
  .log-info { color: var(--muted); }

  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-size: 13px;
  }

  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 480px;
  }

  .modal-title { font-size: 16px; font-weight: 500; margin-bottom: 20px; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 6px; }

  .field input {
    width: 100%;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin 1s linear infinite; display: inline-block; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="logo">mes<span>colis</span></div>
      <div class="header-sub" id="lastSync">Jamais synchronisé</div>
    </div>
    <button class="settings-btn" onclick="openSettings()" title="Paramètres">⚙</button>
  </header>

  <div class="stats-grid" id="stats">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">—</div></div>
    <div class="stat-card"><div class="stat-label">En cours</div><div class="stat-value" style="color:var(--info)">—</div></div>
    <div class="stat-card"><div class="stat-label">Livrés</div><div class="stat-value" style="color:var(--success)">—</div></div>
    <div class="stat-card"><div class="stat-label">Alertes</div><div class="stat-value" style="color:var(--danger)">—</div></div>
  </div>

  <div class="actions">
    <button class="btn btn-accent" id="syncBtn" onclick="syncGmail()">
      ✉ Sync Gmail
    </button>
    <button class="btn" id="refreshBtn" onclick="loadDeliveries()">
      ↻ Actualiser
    </button>
  </div>

  <div class="log-box" id="logBox"></div>

  <div class="filters">
    <button class="filter active" onclick="setFilter('all',this)">tous</button>
    <button class="filter" onclick="setFilter('active',this)">en cours</button>
    <button class="filter" onclick="setFilter('done',this)">livrés</button>
  </div>

  <div id="deliveries"></div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-title">Paramètres</div>
    <div class="field">
      <label>Clé API Parcel</label>
      <input type="text" id="inputParcelKey" placeholder="_4x6EDvv..." />
    </div>
    <div class="field">
      <label>Clé API Anthropic (Claude)</label>
      <input type="text" id="inputClaudeKey" placeholder="sk-ant-..." />
    </div>
    <div class="modal-actions">
      <button class="btn btn-accent" onclick="saveSettings()">Enregistrer</button>
      <button class="btn" onclick="closeSettings()">Annuler</button>
    </div>
  </div>
</div>

<script>
const PARCEL_KEY_DEFAULT = '_4x6EDvvdASRihHJIXZVFWoDIfwibYHLH3KHRWzpfD1k4zMH8XJpgx8BvgwmmSHS7mP2PjINZsC';

let allDeliveries = [];
let currentFilter = 'all';

function getParcelKey() { return localStorage.getItem('parcelKey') || PARCEL_KEY_DEFAULT; }
function getClaudeKey() { return localStorage.getItem('claudeKey') || ''; }

function openSettings() {
  document.getElementById('inputParcelKey').value = getParcelKey();
  document.getElementById('inputClaudeKey').value = getClaudeKey();
  document.getElementById('settingsModal').classList.add('open');
}

function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }

function saveSettings() {
  localStorage.setItem('parcelKey', document.getElementById('inputParcelKey').value.trim());
  localStorage.setItem('claudeKey', document.getElementById('inputClaudeKey').value.trim());
  closeSettings();
  loadDeliveries();
}

const statusInfo = {
  0:{label:'En transit',bg:'var(--info-dim)',tx:'var(--info)'},
  1:{label:'Gelé',bg:'var(--surface2)',tx:'var(--muted)'},
  2:{label:'Livré',bg:'var(--success-dim)',tx:'var(--success)'},
  3:{label:'Tentative échouée',bg:'var(--warning-dim)',tx:'var(--warning)'},
  4:{label:'Exception',bg:'var(--danger-dim)',tx:'var(--danger)'},
  5:{label:'Expiré',bg:'var(--surface2)',tx:'var(--muted)'},
  6:{label:'Prêt à récupérer',bg:'var(--success-dim)',tx:'var(--success)'},
  7:{label:'Retour',bg:'var(--warning-dim)',tx:'var(--warning)'},
  8:{label:'Info reçue',bg:'var(--surface2)',tx:'var(--muted)'},
};

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDeliveries();
}

function renderStats(data) {
  const total = data.length;
  const enCours = data.filter(d => ![2,5].includes(d.status_code)).length;
  const livres = data.filter(d => d.status_code === 2).length;
  const alertes = data.filter(d => [3,4,7].includes(d.status_code)).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">En cours</div><div class="stat-value" style="color:var(--info)">${enCours}</div></div>
    <div class="stat-card"><div class="stat-label">Livrés</div><div class="stat-value" style="color:var(--success)">${livres}</div></div>
    <div class="stat-card"><div class="stat-label">Alertes</div><div class="stat-value" style="color:var(--danger)">${alertes}</div></div>
  `;
}

function renderDeliveries() {
  const el = document.getElementById('deliveries');
  let data = allDeliveries;
  if (currentFilter === 'active') data = data.filter(d => ![2,5,1].includes(d.status_code));
  if (currentFilter === 'done') data = data.filter(d => d.status_code === 2);
  if (!data.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📦</div>Aucune livraison</div>`;
    return;
  }
  el.innerHTML = data.map(d => {
    const s = statusInfo[d.status_code] || statusInfo[0];
    const date = d.estimated_delivery_date ? new Date(d.estimated_delivery_date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}) : null;
    const carrier = (d.carrier_code || '').toUpperCase();
    return `<div class="delivery-card">
      <div class="delivery-top">
        <div style="min-width:0;">
          <div class="delivery-name">${d.description || 'Colis sans nom'}</div>
          <div class="delivery-tracking">${d.tracking_number || ''}</div>
        </div>
        <span class="badge" style="background:${s.bg};color:${s.tx};white-space:nowrap;flex-shrink:0;">${s.label}</span>
      </div>
      <div class="delivery-bottom">
        ${carrier ? `<span class="badge badge-carrier">${carrier}</span>` : ''}
        ${date ? `<span class="badge-date">📅 ${date}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function loadDeliveries() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinning">↻</span> Chargement...';
  document.getElementById('deliveries').innerHTML = `<div class="empty"><div class="spinning" style="font-size:28px;">↻</div></div>`;
  try {
    const res = await fetch('https://api.parcel.app/external/deliveries/?filter_mode=recent', {
      headers: { 'api-key': getParcelKey() }
    });
    if (!res.ok) throw new Error(`Erreur ${res.status}`);
    const data = await res.json();
    allDeliveries = data.deliveries || [];
    renderStats(allDeliveries);
    renderDeliveries();
    document.getElementById('lastSync').textContent = 'Mis à jour ' + new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    document.getElementById('deliveries').innerHTML = `<div class="empty"><div class="empty-icon">⚠</div>${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '↻ Actualiser';
  }
}

function log(msg, type='info') {
  const box = document.getElementById('logBox');
  box.style.display = 'block';
  box.innerHTML += `<div class="log-line log-${type}">${type==='ok'?'✓':type==='err'?'✗':'·'} ${msg}</div>`;
}

async function addToParcel(tracking, description) {
  try {
    const res = await fetch('https://api.parcel.app/external/deliveries/', {
      method: 'POST',
      headers: { 'api-key': getParcelKey(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ tracking_number: tracking, description })
    });
    const data = await res.json();
    if (res.ok) log(`Ajouté : ${tracking}`, 'ok');
    else if (JSON.stringify(data).includes('already')) log(`Déjà présent : ${tracking}`, 'info');
    else log(`Ignoré : ${tracking}`, 'info');
  } catch(e) {
    log(`Erreur réseau : ${tracking}`, 'err');
  }
}

async function syncGmail() {
  const claudeKey = getClaudeKey();
  if (!claudeKey) {
    alert('Ajoute ta clé API Anthropic dans les paramètres ⚙ pour activer la sync Gmail.');
    openSettings();
    return;
  }
  const box = document.getElementById('logBox');
  box.innerHTML = '';
  box.style.display = 'block';
  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinning">↻</span> Analyse...';
  log('Analyse des mails en cours...', 'info');

  try {
    const claudeRes = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': claudeKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `Tu extrais des numéros de suivi de colis depuis des emails. Réponds UNIQUEMENT en JSON sans markdown.
Format: {"colis":[{"tracking":"NUMERO","transporteur":"NOM","description":"label court"}]}`,
        messages: [{role:'user', content:`Extrais les numéros de suivi des 30 derniers jours depuis ces emails de klemitch31@gmail.com :

Email 1 - Vinted (18/05): "Numéro de suivi : 1778952865310239"
Email 2 - Vinted (18/05): "Numéro de suivi : 1778838776141971"
Email 3 - Vinted (18/05): "Numéro de suivi : 1778785333180762"
Email 4 - Mondial Relay (18/05): "colis n°75870771"
Email 5 - Mondial Relay (11/05): "colis n°42094225"
Email 6 - Mondial Relay (08/05): "colis n°68436476"
Email 7 - Chronopost (11/05): "Numéro de colis XW424500832TS"`}]
      })
    });

    const claudeData = await claudeRes.json();
    const text = (claudeData.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const parsed = JSON.parse(text);
    const colis = parsed.colis || [];
    log(`${colis.length} colis détectés`, 'info');
    for (const c of colis) {
      await addToParcel(c.tracking, `${c.transporteur} – ${c.description}`);
      await new Promise(r => setTimeout(r, 600));
    }
    log('Synchronisation terminée !', 'ok');
    setTimeout(() => loadDeliveries(), 1500);
  } catch(e) {
    log(`Erreur : ${e.message}`, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✉ Sync Gmail';
  }
}

loadDeliveries();
</script>
</body>
</html>
